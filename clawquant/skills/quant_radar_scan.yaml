name: quant_radar_scan
description: |
  Scan multiple symbols for trading opportunities using built-in strategies.
  Returns ranked opportunities with confidence scores and explanations.
usage: |
  "扫描 BTC/ETH/SOL 有没有交易机会"
  "Scan BTC/USDT,ETH/USDT for signals using ma_crossover"
command: |
  cd "{project_root}" && .venv/bin/python -m clawquant.clawquant_cli --json radar scan --symbols {symbols} --strategies {strategies} --interval {interval} --days {days} --top {top_n}
parameters:
  symbols:
    type: string
    description: "Comma-separated symbols to scan"
    default: "BTC/USDT,ETH/USDT"
  strategies:
    type: string
    description: "Comma-separated strategies to apply"
    default: "ma_crossover,dca"
  interval:
    type: string
    default: "1h"
  days:
    type: integer
    default: 10
  top_n:
    type: integer
    description: "Number of top opportunities to return"
    default: 10
